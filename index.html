<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Elite Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<!-- مكتبة الأيقونات العالمية Lucide (البديل الأفضل والأشبه بتصميمات أبل) -->
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
  --bg:       #080b10;
  --bg2:      #0f1219;
  --card-bg:  #13161f;
  --raised:   #1c2030;
  --border:   rgba(255,255,255,0.065);
  --border-hi:rgba(201,168,76,0.3);
  --gold:     #C9A84C;
  --gold-dim: rgba(201,168,76,0.1);
  --gold-glow:rgba(201,168,76,0.22);
  --t1:       #edeae2;
  --t2:       #7a7a7a;
  --t3:       #333;
  --mono:     'Space Mono', monospace;
  --sans:     'Tajawal', sans-serif;
  --display:  'Syne', sans-serif;
  --r:        6px;
  --r-lg:     14px;
  --nav-h:    60px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; scroll-padding-top:var(--nav-h); }
body {
  background:var(--bg); color:var(--t1);
  font-family:var(--sans); font-size:15px; line-height:1.7;
  overflow-x:hidden; -webkit-font-smoothing:antialiased;
}
a { color:inherit; text-decoration:none; }

/* scanline */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.015) 2px,rgba(0,0,0,0.015) 4px);
}

/* glows */
.glow { position:fixed; border-radius:50%; filter:blur(110px); pointer-events:none; z-index:0; }
.g1 { width:600px; height:600px; background:radial-gradient(circle,rgba(201,168,76,0.06) 0%,transparent 70%); top:-200px; right:-150px; }
.g2 { width:400px; height:400px; background:radial-gradient(circle,rgba(201,168,76,0.04) 0%,transparent 70%); bottom:5%; left:-100px; }

/* ── NAV ── */
nav {
  position:fixed; top:0; left:0; right:0; height:var(--nav-h); z-index:800;
  background:rgba(8,11,16,0.85); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 1.5rem;
}
.nav-logo {
  display:flex; align-items:center; gap:9px;
  font-family:var(--mono); font-size:.82rem; color:var(--gold); letter-spacing:.04em;
}
.logo-mark {
  width:28px; height:28px; background:var(--gold); border-radius:6px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.logo-mark svg { width:14px; height:14px; }
.logo-cur {
  display:inline-block; width:7px; height:13px; background:var(--gold);
  border-radius:1px; margin-right:1px; vertical-align:middle;
  animation:blink 1s step-end infinite;
}
@keyframes blink { 50%{opacity:0} }
.nav-tag {
  display:flex; align-items:center; gap:6px;
  font-family:var(--mono); font-size:.67rem; letter-spacing:.1em;
  color:var(--gold); padding:.3rem .85rem;
  background:var(--gold-dim); border:1px solid rgba(201,168,76,0.2); border-radius:99px;
}
.tag-dot {
  width:6px; height:6px; background:var(--gold); border-radius:50%;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 var(--gold-glow)} 50%{box-shadow:0 0 0 5px transparent} }

/* ── HERO ── */
.hero {
  position:relative; z-index:1;
  min-height:100dvh; display:flex; align-items:center; justify-content:center;
  padding:calc(var(--nav-h) + 3rem) 1.5rem 3rem;
  text-align:center;
}
.hero-inner { max-width:600px; margin:0 auto; }

.badge {
  display:inline-flex; align-items:center; gap:.5rem;
  padding:.3rem .9rem; background:var(--gold-dim);
  border:1px solid rgba(201,168,76,0.2); border-radius:99px;
  font-family:var(--mono); font-size:.67rem; color:var(--gold); letter-spacing:.1em;
  margin-bottom:1.8rem;
  animation:fadeUp .7s .1s both;
}
.badge-dot { width:6px; height:6px; background:var(--gold); border-radius:50%; animation:pulse 2s ease-in-out infinite; }

.hero-title {
  font-family:var(--display); font-weight:800;
  font-size:clamp(3rem,10vw,5.5rem); line-height:.95; letter-spacing:-.03em;
  margin-bottom:.8rem;
  animation:fadeUp .7s .2s both;
}
.hero-title .solid { display:block; color:var(--t1); }
.hero-title .hollow {
  display:block; color:transparent;
  -webkit-text-stroke:1.5px rgba(201,168,76,0.35);
}

.hero-sub {
  font-size:.97rem; color:var(--t2); line-height:1.82;
  margin:1.2rem auto 2.5rem; max-width:400px;
  padding-top:1rem; border-top:1px solid rgba(201,168,76,0.15);
  animation:fadeUp .7s .3s both;
}

/* 3-stat bar */
.hero-stats {
  display:grid; grid-template-columns:repeat(3,1fr);
  background:var(--card-bg); border:1px solid var(--border);
  border-radius:var(--r); overflow:hidden; margin-bottom:2.5rem;
  animation:fadeUp .7s .4s both;
}
.hstat { padding:.9rem .5rem; text-align:center; border-left:1px solid var(--border); }
.hstat:last-child { border-left:none; }
.hstat-n {
  display:block; font-family:var(--mono); font-size:1.4rem;
  color:var(--gold); line-height:1; margin-bottom:.2rem;
}
.hstat-l { font-size:.67rem; color:var(--t2); text-transform:uppercase; letter-spacing:.08em; }

/* scroll hint */
.scroll-hint {
  display:flex; align-items:center; justify-content:center; gap:.5rem;
  font-family:var(--mono); font-size:.63rem; letter-spacing:.12em;
  color:var(--t3); text-transform:uppercase;
  animation:fadeUp .7s .6s both;
}
.scroll-hint::before, .scroll-hint::after {
  content:''; display:block; width:30px; height:1px; background:var(--t3);
}

@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:none} }

/* ── SECTION BASE ── */
.section { position:relative; z-index:1; padding:5rem 1.5rem; }
.section.alt { background:var(--bg2); }

.sh { display:flex; align-items:center; gap:1.2rem; margin-bottom:3.5rem; }
.sh-code { font-family:var(--mono); font-size:.65rem; color:var(--gold); letter-spacing:.15em; white-space:nowrap; opacity:.8; }
.sh-rule { flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }
.sh-title { font-family:var(--display); font-size:clamp(1.6rem,4vw,2.4rem); font-weight:800; letter-spacing:-.03em; line-height:.95; white-space:nowrap; }

.wrap { max-width:1000px; margin:0 auto; }

/* ── CATEGORY PILLS ── */
.cats-scroll {
  display:flex; gap:.55rem; overflow-x:auto;
  padding-bottom:.5rem; scrollbar-width:none; margin-bottom:2.5rem;
}
.cats-scroll::-webkit-scrollbar { display:none; }
.cat-pill {
  display:inline-flex; align-items:center; gap:.45rem;
  background:var(--card-bg); border:1.5px solid var(--border);
  border-radius:6px; padding:.55rem 1.1rem;
  font-family:var(--mono); font-size:.7rem; letter-spacing:.06em;
  white-space:nowrap; cursor:pointer; flex-shrink:0;
  transition:all .2s; color:var(--t2);
}
.cat-pill svg { width:.95rem; height:.95rem; }
.cat-pill.active, .cat-pill:hover {
  background:var(--gold-dim); color:var(--gold);
  border-color:rgba(201,168,76,0.35);
}

/* count */
#countLabel {
  font-family:var(--mono); font-size:.63rem; color:var(--t2);
  letter-spacing:.1em; text-transform:uppercase;
}

/* ── DEALS GRID ── */
.deals-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:1.1rem;
}

.deal-card {
  background:var(--card-bg); border:1px solid var(--border);
  border-radius:var(--r-lg); overflow:hidden; cursor:pointer;
  transition:all .28s; position:relative;
}
.deal-card:hover {
  border-color:var(--border-hi); transform:translateY(-5px);
  box-shadow:0 24px 60px rgba(0,0,0,.5);
}

.deal-top {
  height:120px; display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}
.deal-top svg {
  width:3rem; height:3rem; color:var(--gold);
  opacity:0.9;
}
.deal-top::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(to bottom, transparent 40%, var(--card-bg));
}

.deal-discount {
  position:absolute; top:12px; right:12px; z-index:2;
  font-family:var(--mono); font-weight:700; font-size:.72rem;
  letter-spacing:.06em; padding:.22rem .65rem;
  background:var(--gold); color:#080b10;
  border-radius:4px;
}
.deal-discount.hi { background:var(--gold); box-shadow:0 0 12px var(--gold-glow); }

.deal-body { padding:1rem 1.1rem 1.1rem; }
.deal-cat {
  font-family:var(--mono); font-size:.6rem; color:var(--gold);
  letter-spacing:.15em; text-transform:uppercase; margin-bottom:.3rem;
  display:flex; align-items:center; gap:.4rem;
}
.deal-cat::before { content:''; display:block; width:14px; height:1px; background:var(--gold); }
.deal-name {
  font-family:var(--display); font-weight:700; font-size:1.1rem;
  color:var(--t1); line-height:1.2; margin-bottom:.5rem;
}
.deal-loc {
  font-family:var(--mono); font-size:.68rem; color:var(--t2);
  display:flex; align-items:center; gap:.35rem;
}
.deal-loc svg { color:var(--gold); width:.75rem; height:.75rem; opacity:0.8; }

/* ── BOTTOM SHEET ── */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px); z-index:200;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.overlay.open { opacity:1; pointer-events:all; }

.sheet {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--card-bg); border-top:1px solid var(--border);
  border-radius:24px 24px 0 0; z-index:201;
  padding:1.5rem 1.4rem 3rem; max-height:88dvh; overflow-y:auto;
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(0.32,0.72,0,1);
}
.overlay.open .sheet { transform:translateY(0); }

/* gold top accent */
.sheet::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
}

.sheet-handle {
  width:40px; height:4px; background:var(--raised);
  border-radius:2px; margin:0 auto 1.5rem;
}
.sheet-icon { 
  display:flex; align-items:center; justify-content:center;
  width:64px; height:64px; border-radius:14px;
  background:var(--gold-dim); border:1px solid rgba(201,168,76,0.15);
  margin-bottom:1.2rem;
}
.sheet-icon svg { width:2.2rem; height:2.2rem; color:var(--gold); }

.sheet-discount {
  display:inline-flex; align-items:center; gap:.4rem;
  background:var(--gold-dim); color:var(--gold);
  font-family:var(--mono); font-weight:700; font-size:1rem;
  letter-spacing:.06em; padding:.3rem .9rem;
  border:1px solid rgba(201,168,76,0.25); border-radius:6px; margin-bottom:.8rem;
}
.sheet-discount svg { width:.9rem; height:.9rem; }

.sheet-name {
  font-family:var(--display); font-weight:800;
  font-size:1.6rem; color:var(--t1); line-height:1.15; margin-bottom:.3rem;
}
.sheet-cat {
  font-family:var(--mono); font-size:.65rem; color:var(--gold);
  letter-spacing:.15em; text-transform:uppercase; margin-bottom:1rem;
}
.sheet-desc { font-size:.9rem; color:var(--t2); line-height:1.75; margin-bottom:1.5rem; }

.sheet-meta { background:var(--bg2); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:1.5rem; }
.sheet-row {
  display:flex; align-items:center; gap:.9rem;
  padding:.9rem 1rem; border-bottom:1px solid var(--border);
  font-size:.84rem;
}
.sheet-row:last-child { border-bottom:none; }
.sheet-row svg { width:1.1rem; height:1.1rem; color:var(--gold); flex-shrink:0; }
.sheet-row-label { font-family:var(--mono); font-size:.65rem; color:var(--t2); letter-spacing:.08em; min-width:65px; flex-shrink:0; }
.sheet-row-val { color:var(--t1); font-size:.88rem; }

.sheet-btn {
  display:flex; align-items:center; justify-content:center; gap:.6rem;
  width:100%; background:var(--gold); color:#080b10;
  font-family:var(--mono); font-weight:700; font-size:.85rem; letter-spacing:.08em;
  text-transform:uppercase; border:none; border-radius:var(--r);
  padding:1.1rem; cursor:pointer; transition:all .22s;
}
.sheet-btn:hover { background:#e8c96e; box-shadow:0 10px 28px var(--gold-glow); }
.sheet-btn svg { width:1.2rem; height:1.2rem; }

.sheet-close {
  position:absolute; top:1.2rem; left:1.4rem;
  background:var(--raised); border:1px solid var(--border);
  color:var(--t2); width:34px; height:34px; border-radius:var(--r);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s;
}
.sheet-close svg { width:1.1rem; height:1.1rem; }
.sheet-close:hover { color:var(--gold); border-color:var(--border-hi); }

/* fi animation */
.fi { opacity:0; transform:translateY(20px); transition:opacity .6s, transform .6s; }
.fi.in { opacity:1; transform:none; }

/* page end */
.page-end { height:2rem; }

/* ── RESPONSIVE ── */
@media(max-width:600px) {
  .sh { flex-direction:column; align-items:flex-start; gap:.4rem; margin-bottom:2rem; }
  .sh-rule { display:none; }
  .sh-title { white-space:normal; font-size:1.6rem; }
  .deals-grid { grid-template-columns:1fr; }
}
</style>
</head>

<!-- NAV -->

      <div class="hstat"><span class="hstat-n">120+</span><div class="hstat-l">شريك</div></div>

    </div>
    <div class="scroll-hint">تصفح الخصومات</div>
  </div>
</div>

<!-- DEALS SECTION -->
<div class="section alt" id="dealsSection">
  <div class="wrap">

    <div class="sh fi">
      <span class="sh-code">01 — Offers</span>
      <div class="sh-rule"></div>

    <!-- Cats (أيقونات بديلة لأبل) -->

      <div class="cat-pill active" onclick="filter('all',this)"><i data-lucide="layout-grid"></i> الكل</div>
      <div class="cat-pill" onclick="filter('food',this)"><i data-lucide="utensils"></i> مطاعم</div>
      <div class="cat-pill" onclick="filter('health',this)"><i data-lucide="activity"></i> صحة</div>
      <div class="cat-pill" onclick="filter('beauty',this)"><i data-lucide="sparkles"></i> سبا وجمال</div>
      <div class="cat-pill" onclick="filter('sport',this)"><i data-lucide="dumbbell"></i> رياضة</div>
      <div class="cat-pill" onclick="filter('hotel',this)"><i data-lucide="building-2"></i> فنادق</div>
      <div class="cat-pill" onclick="filter('shop',this)"><i data-lucide="shopping-bag"></i> تسوق</div>
      <div class="cat-pill" onclick="filter('edu',this)"><i data-lucide="book-open"></i> تعليم</div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;" class="fi" style="transition-delay:.08s">
      <span id="countLabel">9 عروض متاحة</span>
    </div>

    <div class="deals-grid fi" id="dealsGrid" style="transition-delay:.1s"></div>
  </div>
</div>

<div class="page-end"></div>

<!-- OVERLAY + SHEET -->
<div class="overlay" id="overlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <button class="sheet-close" onclick="closeSheet()"><i data-lucide="x"></i></button>
    <div class="sheet-handle"></div>
    <div class="sheet-icon" id="sIcon"></div>
    <div class="sheet-discount" id="sDiscount"></div>
    <div class="sheet-name" id="sName"></div>
    <div class="sheet-cat" id="sCat"></div>
    <div class="sheet-desc" id="sDesc"></div>
    <div class="sheet-meta">
      <div class="sheet-row"><i data-lucide="map-pin"></i><span class="sheet-row-label">الموقع</span><span class="sheet-row-val" id="sLoc"></span></div>
      <div class="sheet-row"><i data-lucide="clock"></i><span class="sheet-row-label">المواعيد</span><span class="sheet-row-val" id="sHours"></span></div>
      <div class="sheet-row"><i data-lucide="phone"></i><span class="sheet-row-label">التليفون</span><span class="sheet-row-val" id="sPhone"></span></div>
    </div>
    <button class="sheet-btn"><i data-lucide="ticket"></i> &nbsp; استخدم الخصم الآن</button>
  </div>
</div>

function renderDeals(cat) {
  const list = cat==='all' ? deals : deals.filter(d=>d.cat===cat);
  document.getElementById('countLabel').textContent = list.length + ' عروض متاحة';
  document.getElementById('dealsGrid').innerHTML = list.map(d=>`
    <div class="deal-card" onclick="openSheet(${deals.indexOf(d)})">
      <div class="deal-top" style="background:${d.bg}">
        <i data-lucide="${d.icon}"></i>
        <div class="deal-discount${d.hi?' hi':''}">${d.discount}</div>
      </div>
      <div class="deal-body">
        <div class="deal-cat">${d.label}</div>
        <div class="deal-name">${d.name}</div>
        <div class="deal-loc"><i data-lucide="map-pin"></i>${d.loc}</div>
      </div>
    </div>`).join('');
    
  // تفعيل الأيقونات الـ Lucide بعد بناء الكروت
  lucide.createIcons({ attrs: { strokeWidth: 1.5 } });
}

function filter(cat, el) {
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderDeals(cat);
}

function openSheet(i) {
  const d = deals[i];
  // وضع الأيقونات بداخل البطاقة المنبثقة
  document.getElementById('sIcon').innerHTML = `<i data-lucide="${d.icon}"></i>`;
  document.getElementById('sDiscount').innerHTML = `<i data-lucide="tag"></i>&nbsp; خصم ${d.discount}`;
  
  document.getElementById('sName').textContent = d.name;
  document.getElementById('sCat').textContent = d.label;
  document.getElementById('sDesc').textContent = d.desc;
  document.getElementById('sLoc').textContent = d.loc;
  document.getElementById('sHours').textContent = d.hours;
  document.getElementById('sPhone').textContent = d.phone;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  
  // إعادة تفعيل الأيقونات الـ Lucide للمحتوى المنبثق
  lucide.createIcons({ attrs: { strokeWidth: 1.5 } });
}

function closeSheet(e) {
  if (e && e.target !== document.getElementById('overlay') && e.target.closest && e.target.closest('.sheet')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// fade in on scroll
document.querySelectorAll('.fi').forEach(el=>{
  new IntersectionObserver(entries=>{
    entries.forEach(x=>{ if(x.isIntersecting) x.target.classList.add('in'); });
  },{threshold:0.08}).observe(el);
});

// تحميل مبدئي للمحتوى
renderDeals('all');

// تفعيل الأيقونات الـ Lucide لعناصر الـ HTML الثابتة خارج الكروت
lucide.createIcons({ attrs: { strokeWidth: 1.5 } });

</script>
